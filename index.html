<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mark Diodemise | Premium Developer Portfolio</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Manrope:wght@700&display=swap" rel="stylesheet"/>

<style>
    body{
        margin:0;
        background:#0b1326;
        color:white;
        font-family:Inter,sans-serif;
    }

    .hero{
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:40px;
    }

    .glass-card{
        background:rgba(255,255,255,0.05);
        backdrop-filter:blur(12px);
        border:1px solid rgba(255,255,255,0.08);
        box-shadow:0 20px 40px rgba(0,0,0,0.4);
    }

    .primary-gradient{
        background:linear-gradient(135deg,#7c3aed 0%,#0566d9 100%);
    }

    .text-gradient{
        background:linear-gradient(135deg,#d2bbff 0%,#4cd7f6 100%);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    .hero-grid{
        max-width:1200px;
        width:100%;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:60px;
        align-items:center;
    }

    .hero-image{
        position:relative;
    }

    .hero-image img{
        width:100%;
        border-radius:24px;
        object-fit:cover;
    }

    .badge{
        display:inline-flex;
        align-items:center;
        gap:8px;
        padding:10px 16px;
        border-radius:999px;
        background:rgba(124,58,237,0.1);
        border:1px solid rgba(124,58,237,0.2);
        color:#d2bbff;
        font-size:12px;
        font-weight:bold;
        text-transform:uppercase;
        letter-spacing:1px;
    }

    h1{
        font-size:64px;
        line-height:1.1;
        margin:20px 0;
        font-family:"Space Grotesk",sans-serif;
    }

    p{
        color:#cbd5e1;
        font-size:18px;
        line-height:1.7;
    }

    .buttons{
        display:flex;
        gap:20px;
        margin-top:30px;
        flex-wrap:wrap;
    }

    .btn-primary{
        background:linear-gradient(135deg,#7c3aed 0%,#0566d9 100%);
        color:white;
        padding:16px 32px;
        border-radius:16px;
        text-decoration:none;
        font-weight:bold;
    }

    .btn-secondary{
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.1);
        color:white;
        padding:16px 32px;
        border-radius:16px;
        text-decoration:none;
        font-weight:bold;
    }

    @media(max-width:900px){
        .hero-grid{
            grid-template-columns:1fr;
        }

        h1{
            font-size:44px;
        }
    }
</style>
</head>

<body>

<section class="hero">

<div class="hero-grid">

<div>
    <div class="badge">
        Available for Projects
    </div>

    <h1>
        Full-Stack <br/>
        <span class="text-gradient">Web Developer</span>
    </h1>

    <p>
        I build modern, scalable, and secure web solutions, bridging the gap between elegant UI/UX and robust backend systems.
    </p>

    <div class="buttons">
        <a class="btn-primary" href="#">
            Hire Me
        </a>

        <a class="btn-secondary" href="#">
            View Projects
        </a>
    </div>
</div>

<div class="hero-image">

    <div class="glass-card" style="padding:16px;border-radius:32px;">

        <img
            alt="Mark Diodemise Professional Portrait"
            src="https://res.cloudinary.com/dgn2cq6yx/image/upload/v1778858751/Mark_cyh2sl.jpg"
        />

    </div>

</div>

</div>

</section>

</body>
</html>
